<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Similar Movie Recommender</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #8B5FBF;
      --secondary: #6D28D9;
      --accent: #A78BFA;
      --light: #ffffff;
      --dark: #1F2937;
      --gray: #6B7280;
      --light-bg: #F8FAFC;
    }
    
    body {
      background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%);
      min-height: 100vh;
      padding-top: 40px;
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .container {
      max-width: 1000px;
    }
    
    .header-section {
      text-align: center;
      margin-bottom: 50px;
    }
    
    .header-section h1 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 15px;
    }
    
    .header-section p {
      font-size: 1.1rem;
      color: var(--gray);
      max-width: 600px;
      margin: 0 auto;
    }
    
    .search-container {
      background: var(--light);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 40px;
      box-shadow: 0 10px 25px rgba(139, 95, 191, 0.1);
      border: 1px solid rgba(139, 95, 191, 0.1);
    }
    
    .search-wrapper {
      position: relative;
      display: flex;
      margin-bottom: 20px;
    }
    
    .search-input {
      border-radius: 12px;
      padding: 15px 130px 15px 20px;
      font-size: 1rem;
      border: 2px solid #E5E7EB;
      transition: all 0.3s ease;
      flex: 1;
    }
    
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
    }
    
    .search-btn {
      position: absolute;
      right: 5px;
      top: 5px;
      bottom: 5px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 10px;
      padding: 0 20px;
      font-weight: 600;
      color: white;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(139, 95, 191, 0.3);
    }
    
    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(139, 95, 191, 0.4);
    }
    
    .search-btn:active {
      transform: translateY(0);
    }
    
    .spinner {
      display: none;
      color: var(--primary);
    }
    
    .message-container {
      min-height: 40px;
      margin: 20px 0;
    }
    
    .results-section {
      margin-top: 30px;
    }
    
    .section-title {
      font-size: 1.5rem;
      margin-bottom: 25px;
      text-align: center;
      font-weight: 700;
      color: var(--dark);
    }
    
    .movie-cards-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    
    .movie-card {
      background: var(--light);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
      border: 1px solid rgba(139, 95, 191, 0.1);
      position: relative;
      overflow: hidden;
    }
    
    .movie-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
    }
    
    .movie-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(139, 95, 191, 0.15);
    }
    
    .movie-rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      text-align: center;
      font-weight: 700;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }
    
    .movie-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--dark);
      line-height: 1.4;
      margin: 0;
    }
    
    .no-results {
      text-align: center;
      padding: 40px;
      font-size: 1.1rem;
      color: var(--gray);
      grid-column: 1 / -1;
    }
    
    .footer {
      margin-top: 60px;
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
      color: var(--gray);
    }
    
    .pulse {
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    
    .fade-in {
      animation: fadeIn 0.5s ease forwards;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Responsive adjustments */
    @media (max-width: 768px) {
      .header-section h1 {
        font-size: 2.2rem;
      }
      
      .movie-cards-container {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      }
      
      .search-input {
        padding-right: 110px;
      }
      
      .search-btn {
        padding: 0 15px;
      }
    }
    
    @media (max-width: 576px) {
      .search-container {
        padding: 20px;
      }
      
      .movie-cards-container {
        grid-template-columns: 1fr;
      }
      
      .search-input {
        padding-right: 100px;
        font-size: 0.9rem;
      }
      
      .search-btn {
        font-size: 0.9rem;
        padding: 0 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-section">
      <h1> Movie Recommender</h1>
      <p>Type a movie name and get 10 similar movies</p>
    </div>
    
    <div class="search-container">
      <div class="search-wrapper">
        <input id="movieInput" type="text" class="form-control search-input" placeholder="Enter a movie title, e.g. 'Ganglands'">
        <button id="searchBtn" class="btn search-btn">
          <i class="fas fa-search me-2"></i> Search
        </button>
      </div>
      <div class="d-flex justify-content-center align-items-center gap-3">
        <div class="spinner-border spinner" role="status" id="spinner">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
      
      <div id="message" class="message-container text-center mt-3"></div>
    </div>
    
    <div class="results-section">
      <h2 class="section-title">Recommendations</h2>
      <div id="results" class="movie-cards-container">
        <!-- Movie cards will be dynamically inserted here -->
      </div>
    </div>
    
    <div class="footer">
      <p>Movie Recommender &copy; 2025</p>
    </div>
  </div>

  <script>
    document.getElementById('searchBtn').addEventListener('click', doSearch);
    document.getElementById('movieInput').addEventListener('keyup', function(e){
      if(e.key === 'Enter') doSearch();
    });

    async function doSearch(){
      const q = document.getElementById('movieInput').value.trim();
      const resultsEl = document.getElementById('results');
      const msgEl = document.getElementById('message');
      const spinner = document.getElementById('spinner');

      resultsEl.innerHTML = '';
      msgEl.innerText = '';
      msgEl.className = 'message-container text-center mt-3';
      
      if(!q) { 
        msgEl.innerText = 'Please enter a movie name.';
        msgEl.classList.add('text-warning');
        return; 
      }

      // Add pulse animation to search button
      const searchBtn = document.getElementById('searchBtn');
      searchBtn.classList.add('pulse');
      
      spinner.style.display = 'inline-block';
      try {
        const resp = await fetch('/recommend', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({query: q})
        });
        const data = await resp.json();

        spinner.style.display = 'none';
        searchBtn.classList.remove('pulse');
        
        if(resp.ok){
          msgEl.innerText = data.message || '';
          msgEl.classList.add('text-success');
          const results = data.results || [];
          
          if(results.length === 0){
            resultsEl.innerHTML = `
              <div class="no-results">
                <i class="fas fa-film fa-3x mb-3"></i>
                <p>No recommendations found. Try another movie title.</p>
              </div>
            `;
          } else {
            // Clear previous results with animation
            resultsEl.innerHTML = '';
            
            // Add new results with staggered animation
            results.forEach((title, idx) => {
              setTimeout(() => {
                const card = createMovieCard(title, idx+1);
                resultsEl.appendChild(card);
                
                // Add fade-in animation
                card.classList.add('fade-in');
              }, idx * 100);
            });
          }
        } else {
          // non-200
          msgEl.innerText = data.message || ('Error: ' + resp.status);
          msgEl.classList.add('text-danger');
        }
      } catch (err) {
        spinner.style.display = 'none';
        searchBtn.classList.remove('pulse');
        msgEl.innerText = 'Error connecting to server: ' + err.message;
        msgEl.classList.add('text-danger');
      }
    }

    function createMovieCard(title, rank) {
      const card = document.createElement('div');
      card.className = 'movie-card';
      
      card.innerHTML = `
        <div class="movie-rank">${rank}</div>
        <h3 class="movie-title">${title}</h3>
      `;
      
      return card;
    }

    // Add some initial animation to the header
    document.addEventListener('DOMContentLoaded', function() {
      const header = document.querySelector('.header-section');
      header.style.opacity = '0';
      header.style.transform = 'translateY(-20px)';
      
      setTimeout(() => {
        header.style.transition = 'all 0.8s ease';
        header.style.opacity = '1';
        header.style.transform = 'translateY(0)';
      }, 300);
    });
  </script>
</body>
</html>
